<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beam Overlay Demo — YHS robot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0e18; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #info {
      position: fixed; top: 12px; left: 12px;
      color: #7faacc; font: 12px/1.6 monospace;
      background: rgba(0,0,0,0.45); padding: 8px 12px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="info">
    beam-overlay demo (ultrasonic preset)<br>
    YHS robot · 6 sensors · mock range data<br>
    drag to rotate · scroll to zoom
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
